# Metas de balanceamento para relatórios e ajuste de entryMonth / personality (pipeline offline).
# Valores são opcionais; scripts usam defaults sensatos se omitidos.

# Meses de jogo: 0 = início, max exclusivo (20 anos x 12 meses simplificados)
entry_month:
  max_month: 240
  # Distribuição alvo por "ano de jogo" (ano = mes // 12). Chaves 0..19 ou "default".
  # Se uniforme por ano, usar fraction_per_year igual para todos.
  year_distribution: uniform # uniform | explicit
  # Se explicit: lista de 20 frações que somam 1.0
  # year_fractions: [0.05, 0.05, ...]

# Quotas mínimas por personalityLabelKey (chaves i18n). Opcional.
# Se vazio, só se reporta histograma sem falha.
personality:
  min_per_key: {}
  # exemplo:
  # min_per_key:
  #   personality.balanced: 5

# Tolerância para validação de tier vs GDD (fração absoluta)
tier_tolerance: 0.03
